version: "3"

services:
  gts-federation:
    image: domoel/gts-federation:latest
    container_name: gts-federation
    user: 1026:100
    volumes:
      - ./data:/app/data
      - ./gts_holmirdas.py:/app/gts_holmirdas.py:ro
      - ./rss_feeds.txt:/app/rss_feeds.txt:ro
    networks:
      - social
    restart: always
    env_file:
      - .env

networks:
  social:
    external: true
